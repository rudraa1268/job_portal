{% extends 'jobs/base.html' %}

{% block title %}Apply - {{ job.title }}{% endblock %}

{% block content %}
<div class="card">
    <h2>Apply for {{ job.title }}</h2>
    <p style="margin-bottom: 1rem;">{{ job.company.name }} &middot; {{ job.location }}</p>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="actions">
            <button type="submit" class="btn">Submit Application</button>
            <a href="{% url 'job_detail' job.pk %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
