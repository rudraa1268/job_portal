{% extends 'jobs/base.html' %}

{% block title %}Login - Job Portal{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 0 auto;">
    <h2>Login</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Login</button>
    </form>

    <p style="margin-top: 1rem;">Don't have an account? <a href="{% url 'register' %}">Register here</a></p>
</div>
{% endblock %}
