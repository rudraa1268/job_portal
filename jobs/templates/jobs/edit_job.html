{% extends 'jobs/base.html' %}

{% block title %}Edit Job - {{ job.title }}{% endblock %}

{% block content %}
<div class="card">
    <h2>Edit Job: {{ job.title }}</h2>
    <p style="margin-bottom: 1rem; color: #666;">Company: {{ job.company.name }}</p>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="actions">
            <button type="submit" class="btn">Save Changes</button>
            <a href="{% url 'my_jobs' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
